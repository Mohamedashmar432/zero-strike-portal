name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: pytest
      - name: Dependency audit (informational)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      - name: Dependency audit (informational)
        continue-on-error: true
        run: npm audit --audit-level=high

  # Confirms the actual images this app ships (deploy/docker-compose.yml builds these same
  # Dockerfiles) still build -- lint/test/build above never touch either Dockerfile, so a
  # broken image could otherwise merge unnoticed. Gated behind backend/frontend passing
  # first since this is by far the slowest job (the backend stage compiles the separate
  # scanner repo from scratch with CGO_ENABLED=1, then runs a real scan smoke check).
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build ./backend
      - run: docker build ./frontend
