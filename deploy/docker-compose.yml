services:
  backend:
    build:
      context: ../backend
      args:
        SCANNER_REPO: ${SCANNER_REPO:-https://github.com/Mohamedashmar432/zero-strike-SAST-engine.git}
        SCANNER_REF: ${SCANNER_REF:-v0.23.0}
      # Private scanner repo? Uncomment and build with:
      #   docker build --secret id=scanner_git_token,env=SCANNER_GIT_TOKEN ...
      # secrets:
      #   - scanner_git_token
    env_file: .env
    environment:
      # Reports live in Mongo (no artifact volume). Clones go to an ephemeral tmpfs.
      CLONE_WORKDIR_PATH: /tmp/zs-clones
    secrets:
      - mongodb_uri
      - jwt_secret
    tmpfs:
      # Ephemeral, size-capped clone workspace.
      - /tmp/zs-clones:size=2147483648
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ../frontend
    env_file: .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

secrets:
  mongodb_uri:
    file: ./secrets/mongodb_uri.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

volumes:
  caddy_data:
  caddy_config:
